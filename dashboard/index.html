<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>research-ops · live dashboard</title>
<style>
  /* self-contained, 외부 의존 없음, 시스템 폰트 */
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#30363d;
    --fg:#e6edf3; --muted:#8b949e; --dim:#6e7681;
    --ready:#8b949e; --running:#3b82f6; --verify:#a371f7; --done:#3fb950;
    --human:#f85149; --tech:#d29922; --bar:#238636; --barbg:#21262d;
    --chip:#21262d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    font-size:14px;line-height:1.5}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(13,17,23,.85));
    border-bottom:1px solid var(--border);padding:14px 20px;backdrop-filter:blur(6px)}
  .top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
  h1 .v{color:var(--dim);font-weight:400;font-size:12px}
  select,button{background:var(--panel2);color:var(--fg);border:1px solid var(--border);
    border-radius:7px;padding:6px 10px;font:inherit;cursor:pointer}
  button:hover,select:hover{border-color:#484f58}
  .spacer{flex:1}
  .badge{font-size:11px;color:var(--muted);padding:3px 8px;border:1px solid var(--border);
    border-radius:999px;background:var(--chip)}
  .badge.warn{color:#f0b429;border-color:#5c4813}
  .badge.err{color:var(--human);border-color:#5c1a1a}
  main{max-width:1080px;margin:0 auto;padding:18px 20px 60px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .card h2{font-size:13px;margin:0 0 10px;font-weight:600;color:var(--fg);
    display:flex;align-items:center;gap:8px}
  .card h2 .n{color:var(--dim);font-weight:400}
  .row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border)}
  .row:first-of-type{border-top:none}
  a{color:#58a6ff;text-decoration:none}
  a:hover{text-decoration:underline}
  .num{color:var(--dim);font-variant-numeric:tabular-nums;min-width:42px}
  .title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .age{font-variant-numeric:tabular-nums;font-size:12px;color:var(--muted);white-space:nowrap}
  .age.hot{color:var(--human);font-weight:650}
  .chip{font-size:11px;padding:2px 7px;border-radius:999px;background:var(--chip);color:var(--muted);white-space:nowrap}
  .chip.human{background:rgba(248,81,73,.15);color:#ff7b72}
  .chip.stale{background:rgba(210,153,34,.15);color:#e3b341}
  .empty{color:var(--dim);padding:6px 0;font-style:italic}
  /* progress bars */
  .pbar{height:8px;background:var(--barbg);border-radius:6px;overflow:hidden;flex:1}
  .pbar > i{display:block;height:100%;background:var(--bar)}
  .phase-row{display:flex;align-items:center;gap:10px;padding:6px 0}
  .phase-row .lbl{width:46px;color:var(--muted);font-variant-numeric:tabular-nums}
  .phase-row .frac{width:64px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px}
  /* header progress */
  .hprog{display:flex;align-items:center;gap:10px;margin-top:8px;max-width:520px}
  .hprog .pbar{height:10px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
  .d-human{background:var(--human)} .d-running{background:var(--running)}
  .d-verify{background:var(--verify)} .d-tech{background:var(--tech)} .d-done{background:var(--done)}
  footer{color:var(--dim);font-size:12px;text-align:center;padding:20px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:6px}
  .legend span{display:flex;align-items:center;gap:5px}
  code{background:var(--panel2);padding:1px 5px;border-radius:5px;font-size:12px}
</style>
</head>
<body>
<header>
  <div class="top">
    <h1>research-ops <span class="v">live dashboard · v2</span></h1>
    <select id="projSel" title="프로젝트 선택"></select>
    <span class="spacer"></span>
    <span class="badge" id="cacheBadge" hidden>cached</span>
    <span class="badge" id="rateBadge">rate –</span>
    <button id="refreshBtn">↻ 새로고침</button>
  </div>
  <div class="hprog">
    <span id="phaseNow" class="badge">phase –</span>
    <div class="pbar"><i id="overallBar" style="width:0%"></i></div>
    <span id="overallFrac" class="age">0/0</span>
  </div>
  <div class="legend">
    <span><i class="dot d-human"></i>blocked-human</span>
    <span><i class="dot d-tech"></i>blocked-tech</span>
    <span><i class="dot d-running"></i>running</span>
    <span><i class="dot d-verify"></i>verify</span>
    <span><i class="dot d-done"></i>done</span>
  </div>
</header>

<main>
  <div class="card" id="gatesCard">
    <h2>🔴 게이트 대기 <span class="n" id="gatesN"></span></h2>
    <div id="gates"></div>
  </div>

  <div class="grid">
    <div class="card" id="runningCard">
      <h2>🔵 실행 중 <span class="n" id="runningN"></span></h2>
      <div id="running"></div>
    </div>
    <div class="card" id="verifyCard">
      <h2>🟣 검증 대기 <span class="n" id="verifyN"></span></h2>
      <div id="verify"></div>
    </div>
  </div>

  <div class="card">
    <h2>📊 phase별 진행</h2>
    <div id="phases"></div>
  </div>

  <div class="card">
    <h2>🧭 최근 Decision <span class="n">(MGMT)</span></h2>
    <div id="decisions"></div>
  </div>
</main>

<footer id="foot">불러오는 중…</footer>

<script>
/* ===== CONFIG — 프로젝트 추가는 여기만 ===== */
const CONFIG = {
  projects: [
    { name:"DGCC", owner:"jiminc77", mgmtRepo:"research-dashboard", codeRepo:"DGCC", titlePrefix:"" }
    // 다중 프로젝트: { name:"XYZ", owner:"jiminc77", mgmtRepo:"research-dashboard", codeRepo:"XYZ", titlePrefix:"[XYZ] " }
  ]
};
const REFRESH_MS = 5*60*1000;   // 5분 자동 새로고침
const API = "https://api.github.com";

/* ===== 상태 ===== */
let curIdx = 0;
let timer = null;

/* ===== 유틸 ===== */
const $ = id => document.getElementById(id);
const esc = s => (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function hoursSince(iso){ return Math.floor((Date.now()-new Date(iso).getTime())/3.6e6); }
function ageText(h){ return h>=48 ? Math.floor(h/24)+"d" : h+"h"; }

/* state 라벨 뽑기 */
function stateOf(issue){
  const l = (issue.labels||[]).map(x=>typeof x==="string"?x:x.name);
  const s = l.find(n=>n && n.startsWith("state:"));
  return s ? s.slice(6) : null;
}
function hasLabel(issue, name){
  return (issue.labels||[]).some(x=>(typeof x==="string"?x:x.name)===name);
}
/* 제목 [P{k}-M{n}] 파싱 (라벨 없는 기존 이슈도 잡는다) */
const TITLE_RE = /\[P(\d+)-M(\d+)\]/i;
function phaseFromTitle(t){ const m=(t||"").match(TITLE_RE); return m?("P"+m[1]):null; }
/* 하위호환: state 라벨이 없을 때 phase:Pk 라벨 → 제목 순으로 */
function phaseOf(issue){
  const l=(issue.labels||[]).map(x=>typeof x==="string"?x:x.name);
  const pl=l.find(n=>n&&/^phase:P\d+$/.test(n));
  if(pl) return pl.slice(6);
  return phaseFromTitle(issue.title);
}

/* 게이트 대기 판정: state:blocked-human 라벨 OR (하위호환) 본문/제목에 human_blocked·HUMAN GATE 텍스트 */
function isGateWaiting(issue){
  if(issue.state!=="open") return false;
  if(hasLabel(issue,"state:blocked-human")) return true;
  const hay = ((issue.title||"")+" "+(issue.body||"")).toLowerCase();
  return hay.includes("human_blocked") || hay.includes("human gate") || hay.includes("### gate request");
}

/* ===== 조건부 fetch (ETag) + localStorage 캐시 ===== */
let rateRemaining = "–";
async function ghGet(url){
  const key = "roapi:"+url;
  let cached = null;
  try { cached = JSON.parse(localStorage.getItem(key)||"null"); } catch(e){}
  const headers = { "Accept":"application/vnd.github+json" };
  if(cached && cached.etag) headers["If-None-Match"] = cached.etag;
  let res;
  try {
    res = await fetch(url, { headers });
  } catch(e){
    if(cached) return { data:cached.data, fromCache:true };
    throw e;
  }
  const rem = res.headers.get("X-RateLimit-Remaining");
  if(rem!==null) rateRemaining = rem;
  if(res.status===304 && cached){ return { data:cached.data, fromCache:true }; }
  if(res.status===403){ // rate limit → 캐시 렌더
    if(cached) return { data:cached.data, fromCache:true, rateLimited:true };
    throw new Error("rate limited, no cache");
  }
  if(!res.ok){
    if(cached) return { data:cached.data, fromCache:true };
    throw new Error("HTTP "+res.status);
  }
  const data = await res.json();
  const etag = res.headers.get("ETag");
  try { localStorage.setItem(key, JSON.stringify({ etag, data })); } catch(e){}
  return { data, fromCache:false };
}

/* per_page=100 단순 조회 (100개 초과는 캐시·rate-limit 절약 위해 첫 페이지만; 단일 연구 규모에 충분) */
async function fetchAll(base){
  const r = await ghGet(base);
  return r;
}

/* ===== 렌더 ===== */
function renderIssueRow(issue, {showChip}={}){
  const h = hoursSince(issue.updated_at);
  const hot = h>=6;
  const stale = h>=4;
  let chip = "";
  if(showChip==="human"){ chip = `<span class="chip human">gate</span>`; }
  else if(showChip==="stale" && stale){ chip = `<span class="chip stale">stale ${ageText(h)}</span>`; }
  return `<div class="row">
    <span class="num">#${issue.number}</span>
    <a class="title" href="${esc(issue.html_url)}" target="_blank" title="${esc(issue.title)}">${esc(issue.title)}</a>
    ${chip}
    <span class="age ${hot&&showChip==='human'?'hot':''}">${ageText(h)}</span>
  </div>`;
}
function renderEmpty(el){ el.innerHTML = `<div class="empty">없음</div>`; }

function render(codeIssues, mgmtIssues, milestones, note){
  // 헤더 진행률: state 라벨 기준 done/total (라벨 없으면 closed로 보조)
  const devs = codeIssues.filter(i => hasLabel(i,"type:dev") || TITLE_RE.test(i.title||""));
  const total = devs.length || codeIssues.length;
  const done = devs.filter(i => hasLabel(i,"state:done") || i.state==="closed").length;
  const pct = total ? Math.round(done/total*100) : 0;
  $("overallBar").style.width = pct+"%";
  $("overallFrac").textContent = `${done}/${total}`;

  // 현재 phase: 열린 이슈 중 최소 phase 번호
  const openPhases = codeIssues.filter(i=>i.state==="open").map(phaseOf).filter(Boolean)
                     .map(p=>parseInt(p.slice(1),10)).filter(n=>!isNaN(n));
  $("phaseNow").textContent = openPhases.length ? ("phase P"+Math.min(...openPhases)) : "phase –";

  // 🔴 게이트 대기
  const gates = codeIssues.filter(isGateWaiting)
    .sort((a,b)=>new Date(a.updated_at)-new Date(b.updated_at)); // 오래된 것 위로
  $("gatesN").textContent = gates.length ? `(${gates.length})` : "";
  if(gates.length){
    $("gates").innerHTML = gates.map(i=>{
      const h=hoursSince(i.updated_at); const hot=h>=6;
      return `<div class="row">
        <span class="num">#${i.number}</span>
        <a class="title" href="${esc(i.html_url)}" target="_blank" title="${esc(i.title)}">${esc(i.title)}</a>
        <span class="age ${hot?'hot':''}">${ageText(h)}${hot?' ⚠️':''}</span>
      </div>`;
    }).join("");
  } else renderEmpty($("gates"));

  // 🔵 실행 중
  const running = codeIssues.filter(i=>i.state==="open" && hasLabel(i,"state:running"))
    .sort((a,b)=>new Date(a.updated_at)-new Date(b.updated_at));
  $("runningN").textContent = running.length?`(${running.length})`:"";
  if(running.length) $("running").innerHTML = running.map(i=>renderIssueRow(i,{showChip:"stale"})).join("");
  else renderEmpty($("running"));

  // 🟣 검증 대기
  const verifying = codeIssues.filter(i=>i.state==="open" && hasLabel(i,"state:verify"));
  $("verifyN").textContent = verifying.length?`(${verifying.length})`:"";
  if(verifying.length) $("verify").innerHTML = verifying.map(i=>renderIssueRow(i,{})).join("");
  else renderEmpty($("verify"));

  // 📊 phase별 진행 (제목 regex + phase 라벨 병용)
  const byPhase = {};
  codeIssues.forEach(i=>{
    const p = phaseOf(i); if(!p) return;
    byPhase[p] = byPhase[p] || {done:0,total:0};
    byPhase[p].total++;
    if(hasLabel(i,"state:done") || i.state==="closed") byPhase[p].done++;
  });
  const phaseKeys = Object.keys(byPhase).sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));
  $("phases").innerHTML = phaseKeys.length ? phaseKeys.map(p=>{
    const {done,total}=byPhase[p]; const pc=total?Math.round(done/total*100):0;
    return `<div class="phase-row">
      <span class="lbl">${p}</span>
      <div class="pbar"><i style="width:${pc}%;background:${done===total?'var(--done)':'var(--running)'}"></i></div>
      <span class="frac">${done}/${total}</span>
    </div>`;
  }).join("") : `<div class="empty">phase 이슈 없음</div>`;

  // 🧭 최근 Decision (MGMT)
  const decs = mgmtIssues.filter(i =>
      hasLabel(i,"type:decision") || /\[decision\]/i.test(i.title||""))
    .sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at)).slice(0,6);
  $("decisions").innerHTML = decs.length ? decs.map(i=>{
    const h=hoursSince(i.updated_at);
    return `<div class="row">
      <span class="num">#${i.number}</span>
      <a class="title" href="${esc(i.html_url)}" target="_blank">${esc(i.title)}</a>
      <span class="age">${ageText(h)}</span>
    </div>`;
  }).join("") : `<div class="empty">없음</div>`;

  // footer + badges
  $("rateBadge").textContent = "rate "+rateRemaining;
  $("cacheBadge").hidden = !note.fromCache;
  $("foot").innerHTML = `마지막 갱신 ${new Date().toLocaleString('ko-KR')} · GitHub API 잔여 ${rateRemaining}`
    + (note.rateLimited ? ` · <span style="color:var(--tech)">rate-limit — 캐시 표시 중</span>` : "");
}

/* ===== 로드 ===== */
async function load(){
  const p = CONFIG.projects[curIdx];
  $("foot").textContent = "불러오는 중…";
  let fromCache=false, rateLimited=false;
  try {
    const codeR = await fetchAll(`${API}/repos/${p.owner}/${p.codeRepo}/issues?state=all&per_page=100`);
    const mgmtR = await fetchAll(`${API}/repos/${p.owner}/${p.mgmtRepo}/issues?state=all&per_page=100`);
    let milestones=[];
    try { milestones = (await fetchAll(`${API}/repos/${p.owner}/${p.codeRepo}/milestones?state=all`)).data; } catch(e){}
    fromCache = codeR.fromCache || mgmtR.fromCache;
    rateLimited = codeR.rateLimited || mgmtR.rateLimited;
    // /issues 는 PR도 포함 → 제외
    const codeIssues = (codeR.data||[]).filter(i=>!i.pull_request);
    const mgmtIssues = (mgmtR.data||[]).filter(i=>!i.pull_request);
    render(codeIssues, mgmtIssues, milestones, {fromCache, rateLimited});
  } catch(e){
    $("foot").innerHTML = `<span style="color:var(--human)">로드 실패: ${esc(String(e.message||e))}</span> · 새로고침 재시도`;
  }
}

/* ===== 초기화 ===== */
function initProjects(){
  const sel = $("projSel");
  sel.innerHTML = CONFIG.projects.map((p,i)=>`<option value="${i}">${esc(p.name)}</option>`).join("");
  sel.onchange = () => { curIdx = +sel.value; load(); };
}
$("refreshBtn").onclick = load;
function scheduleRefresh(){ if(timer) clearInterval(timer); timer=setInterval(load, REFRESH_MS); }

initProjects();
load();
scheduleRefresh();
</script>
</body>
</html>
