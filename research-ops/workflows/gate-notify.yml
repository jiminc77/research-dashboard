# 킷 원본 — 새 프로젝트의 CODE 레포 .github/workflows/ 로 복사해 사용
# research-ops v2 — HUMAN GATE 알림·리마인더·soft default 자동 채택 (CODE repo)
# 전제: repo secret NTFY_TOPIC (폰 ntfy 앱에서 구독한 토픽명, 추측 불가능한 문자열).
# Slack/Discord 대체는 아래 각 curl 옆 주석 참조.
name: gate-notify

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  schedule:
    - cron: "0 */6 * * *"      # 6시간마다: 리마인더 + soft deadline 자동 채택
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  # (1) state:blocked-human 라벨 부착 시 즉시 푸시
  notify-label:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'state:blocked-human'
    runs-on: ubuntu-latest
    steps:
      - name: Push (ntfy)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TITLE: ${{ github.event.issue.title }}
          URL: ${{ github.event.issue.html_url }}
          BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          [ -n "${NTFY_TOPIC:-}" ] || { echo "NTFY_TOPIC 미설정 — 스킵"; exit 0; }
          # 본문 첫 줄 요약
          first="$(printf '%s' "$BODY" | tr -d '\r' | grep -v '^\s*$' | head -1 | cut -c1-120)"
          msg="$(printf '%s\n%s' "$first" "$URL")"
          curl -fsS \
            -H "Title: 🔴 HUMAN GATE: ${TITLE}" \
            -H "Priority: urgent" \
            -H "Tags: warning" \
            -d "$msg" \
            "https://ntfy.sh/${NTFY_TOPIC}" || echo "ntfy push 실패(무시)"
          # --- Slack 대체 ---
          # curl -fsS -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"🔴 HUMAN GATE: ${TITLE}\n${URL}\"}" "${{ secrets.SLACK_WEBHOOK }}"
          # --- Discord 대체 ---
          # curl -fsS -H 'Content-Type: application/json' \
          #   -d "{\"content\":\"🔴 HUMAN GATE: ${TITLE}\n${URL}\"}" "${{ secrets.DISCORD_WEBHOOK }}"

  # (2) 댓글에 ### GATE REQUEST 포함 시 푸시 + state:blocked-human 자가치유
  notify-comment:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '### GATE REQUEST')
    runs-on: ubuntu-latest
    steps:
      - name: Push + ensure label
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TITLE: ${{ github.event.issue.title }}
          URL: ${{ github.event.issue.html_url }}
          COMMENT: ${{ github.event.comment.body }}
          REPO: ${{ github.repository }}
          NUM: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          # question: 줄 추출 (없으면 첫 비어있지 않은 줄)
          q="$(printf '%s' "$COMMENT" | tr -d '\r' | grep -iE '^question:' | head -1 | sed 's/^[Qq]uestion:[[:space:]]*//' | cut -c1-120)"
          [ -n "$q" ] || q="$(printf '%s' "$COMMENT" | grep -v '^\s*$' | head -1 | cut -c1-120)"
          if [ -n "${NTFY_TOPIC:-}" ]; then
            msg="$(printf '%s\n%s' "$q" "$URL")"
            curl -fsS \
              -H "Title: 🔴 GATE REQUEST: ${TITLE}" \
              -H "Priority: urgent" -H "Tags: warning" \
              -d "$msg" "https://ntfy.sh/${NTFY_TOPIC}" || echo "ntfy 실패(무시)"
          fi
          # 라벨 자가치유 (누락 시 부착)
          gh issue edit "$NUM" -R "$REPO" --add-label "state:blocked-human" || echo "라벨 부착 실패(무시)"

  # (3) schedule: 리마인더 — open + blocked-human 요약 (hard/soft 무관)
  remind:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Remind pending gates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          [ -n "${NTFY_TOPIC:-}" ] || { echo "NTFY_TOPIC 미설정 — 스킵"; exit 0; }
          json="$(gh issue list -R "$REPO" --state open --label state:blocked-human \
                  --json number,title,updatedAt -q '.' || echo '[]')"
          count="$(printf '%s' "$json" | jq 'length')"
          [ "$count" -gt 0 ] || { echo "대기 게이트 없음"; exit 0; }
          # 최장 경과 시간 계산
          now=$(date -u +%s)
          maxh=0
          while read -r ts; do
            [ -n "$ts" ] || continue
            e=$(date -u -d "$ts" +%s 2>/dev/null || echo "$now")
            h=$(( (now - e) / 3600 )); [ "$h" -gt "$maxh" ] && maxh=$h
          done < <(printf '%s' "$json" | jq -r '.[].updatedAt')
          curl -fsS \
            -H "Title: ⏳ 대기 중 게이트 ${count}건" \
            -H "Priority: high" -H "Tags: hourglass" \
            -d "HUMAN GATE ${count}건 대기 중, 최장 ${maxh}h. 확인 필요." \
            "https://ntfy.sh/${NTFY_TOPIC}" || echo "ntfy 실패(무시)"

  # (4) schedule: soft + deadline 경과 → default 자동 채택 (방어적)
  auto-default:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Adopt default for expired soft gates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          now=$(date -u +%s)
          nums="$(gh issue list -R "$REPO" --state open --label state:blocked-human \
                  --json number -q '.[].number' || true)"
          [ -n "$nums" ] || { echo "blocked-human 없음"; exit 0; }
          for n in $nums; do
            # 최신 GATE REQUEST 댓글 body
            body="$(gh issue view "$n" -R "$REPO" --json comments \
                    -q '[.comments[].body | select(contains("### GATE REQUEST"))] | last' 2>/dev/null || true)"
            [ -n "$body" ] && [ "$body" != "null" ] || continue
            cls="$(printf '%s' "$body" | tr -d '\r' | grep -iE '^class:' | head -1 | sed 's/^[Cc]lass:[[:space:]]*//' | tr '[:upper:]' '[:lower:]' | awk '{print $1}')"
            [ "$cls" = "soft" ] || continue
            dl="$(printf '%s' "$body" | tr -d '\r' | grep -iE '^deadline:' | head -1 | sed 's/^[Dd]eadline:[[:space:]]*//' | awk '{print $1}')"
            df="$(printf '%s' "$body" | tr -d '\r' | grep -iE '^default:' | head -1 | sed 's/^[Dd]efault:[[:space:]]*//' | awk '{print $1}')"
            # 필드 못 읽으면 아무것도 안 함 (방어적)
            [ -n "$dl" ] && [ -n "$df" ] || { echo "#$n soft이나 default/deadline 파싱 실패 — 스킵"; continue; }
            de=$(date -u -d "$dl" +%s 2>/dev/null || echo 0)
            [ "$de" -gt 0 ] || { echo "#$n deadline 파싱 실패 — 스킵"; continue; }
            if [ "$now" -ge "$de" ]; then
              gh issue comment "$n" -R "$REPO" \
                --body "⏰ DEADLINE PASSED → DEFAULT (${df}) ADOPTED (PROTOCOL.md §gate). 다음 세션이 집행합니다." || true
              gh issue edit "$n" -R "$REPO" --remove-label "state:blocked-human" --add-label "state:ready" || true
              if [ -n "${NTFY_TOPIC:-}" ]; then
                curl -fsS -H "Title: ⏰ soft gate #${n} default (${df}) 채택" \
                  -H "Tags: white_check_mark" \
                  -d "deadline 경과로 기본값 ${df} 자동 채택. 필요 시 되돌리세요." \
                  "https://ntfy.sh/${NTFY_TOPIC}" || true
              fi
              echo "#$n default ${df} 채택"
            fi
          done

  # (5) 사람 GATE VERDICT 게시 → blocked-human 해제 (기계 백업 — gjc 협조 불요)
  verdict-label:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '### GATE VERDICT') && github.event.comment.user.login == 'jiminc77'
    runs-on: ubuntu-latest
    steps:
      - name: Flip label on verdict
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NUM: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          # 가드: 실제 게이트(blocked-human 부착) 상태에서만 전환 — 인용/공지 코멘트 오발동 방지
          has="$(gh issue view "$NUM" -R "$REPO" --json labels -q '[.labels[].name] | index("state:blocked-human")')"
          [ "$has" != "null" ] && [ -n "$has" ] || { echo "blocked-human 아님 — 스킵"; exit 0; }
          gh issue edit "$NUM" -R "$REPO" --remove-label "state:blocked-human" --add-label "state:ready" || echo "라벨 전환 실패(무시)"
