# 킷 원본 — 새 프로젝트의 CODE 레포 .github/workflows/ 로 복사해 사용
# research-ops v2 — 단계 자동 전환 (2세션 모델, API 키 불필요)
# phase:P{k} 라벨의 open 이슈가 0이 되는 순간:
#   1) P{k+1} 세션 A 킥오프 이슈 자동 생성 (본문 = 복붙용 세션 A 지시서, 값 채워짐)
#   2) ntfy 푸시 (이슈 링크 포함)
# 사람이 하는 일: 푸시 받고 → 이슈 열고 → 프롬프트 복사 → 새 세션 A에 붙여넣기. 끝.
#
# 선택 설정: 레포 Variables 에 MGMT_REPO (기본값 research-dashboard)
name: phase-transition

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  kickoff:
    runs-on: ubuntu-latest
    steps:
      - name: detect phase completion & create kickoff
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          MGMT_REPO: ${{ vars.MGMT_REPO || 'research-dashboard' }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          # 닫힌 이슈의 phase 라벨
          PHASE=$(gh api "repos/$REPO/issues/$ISSUE_NUM" --jq '[.labels[].name|select(startswith("phase:"))][0] // empty')
          [ -z "$PHASE" ] && { echo "phase 라벨 없음 — 통과"; exit 0; }
          K="${PHASE#phase:P}"
          # 같은 phase 의 미결 이슈 수 (PR 제외)
          OPEN=$(gh api "repos/$REPO/issues?state=open&labels=$PHASE&per_page=100" --jq '[.[]|select(has("pull_request")|not)]|length')
          echo "P$K open=$OPEN"
          [ "$OPEN" -gt 0 ] && exit 0
          NEXT=$((K+1))
          # 세션 A 실행 옵션(웹 pro 경로)용 파라미터 — PROJECT 기본값은 CODE 레포명 (projects/<slug>와 일치시킬 것)
          PROJECT="${REPO##*/}"
          PRO_PROMPT_URL="https://raw.githubusercontent.com/${OWNER}/${MGMT_REPO}/main/research-ops/templates/pro_orchestrator_prompt.md"
          # 멱등: 킥오프 이슈가 이미 있으면 통과
          DUP=$(gh issue list -R "$REPO" --state all --search "P${NEXT} 세션 A 킥오프 in:title" --json number --jq length)
          [ "$DUP" -gt 0 ] && { echo "킥오프 이미 존재 — 통과"; exit 0; }
          # 다음 마일스톤이 없으면 프로젝트 종료 알림만
          HAS_NEXT=$(gh api "repos/$REPO/milestones?state=all&per_page=100" --jq "[.[]|select(.title|startswith(\"P${NEXT}\"))]|length")
          if [ "$HAS_NEXT" -eq 0 ]; then
            if [ -n "${NTFY_TOPIC:-}" ]; then
              curl -s -H "Title: 🏁 P${K} 완료 — 다음 마일스톤 없음" -H "Tags: checkered_flag" \
                -d "모든 단계가 끝났습니다. 종료 절차(ORCHESTRATOR STEP 6)를 검토하세요." \
                "ntfy.sh/${NTFY_TOPIC}" >/dev/null || true
            fi
            exit 0
          fi
          # 킥오프 이슈 본문 (복붙용 세션 A 지시서)
          BODY_FILE=$(mktemp)
          {
          echo "## P${K} 완료 → P${NEXT}"
          echo
          echo "## 세션 A 실행 옵션"
          echo
          echo "세션 A를 아래 **두 경로 중 하나**로 실행하세요."
          echo
          echo "### (a) 기존 Claude/Cowork 경로"
          echo "아래 프롬프트를 **새 세션 A(메인 오케스트레이터)에 그대로 붙여넣으세요.** (branch+PR 게시가 어려운 환경이면 이 경로.)"
          echo
          echo '~~~text'
          echo "새 단계 오케스트레이션을 맡긴다(세션 A). ${OWNER}/${MGMT_REPO} 의"
          echo "research-ops/ORCHESTRATOR.md 와 PROTOCOL.md, templates/ 를 읽고 그대로 따른다."
          echo "STEP 0(프로젝트 설정 로드)부터 시작 — 라벨·마일스톤·워크플로는 이미 생성됨."
          echo "- 구현 레포: ${REPO} · 관리 레포: ${OWNER}/${MGMT_REPO}"
          echo "- 프로젝트 설정: 관리 레포 projects/ 에서 이 구현 레포(${REPO})와 일치하는 파일을 읽어라"
          echo "  (code_repo·ssh_host·workdir·모델·ntfy 토픽명)."
          echo "- 단계: P${NEXT}"
          echo "- **시작 전 회고: P${K}의 리포트·[CHECKPOINT] 코멘트·게이트(GATE VERDICT) 기록을 읽고"
          echo "  P${NEXT}.md 설계에 반영할 목록을 명시**(승계 수치·리스크·바뀐 가정·follow-up)."
          echo "- 회고 산출물: P${K}(방금 끝난 단계) 리포트 HTML을 research-ops/templates/phase_report_guide.md 형식으로 생성해 관리 레포 projects/{project}/reports/ 에 커밋하라"
          echo "- P${NEXT}.md 작성: templates/phase_spec.md 뼈대. @goal 블록마다 Exit에 primary+guard 지표"
          echo "  사전등록, HUMAN GATE는 class(hard/soft) 지정. 완료 후 CODE repo에 push."
          echo "- dev 이슈 발행: bash research-ops/scripts/setup_phase.sh P${NEXT} <P${NEXT}.md 경로>"
          echo "  (착수 시 state:ready, 게이트는 GATE REQUEST+state:blocked-human, 완료는 EVIDENCE"
          echo "  (primary+guard) 후 CI VERIFIED ✅ 기다렸다 close, 진행은 PROGRESS 코멘트 편집)."
          echo "- **마지막에 세션 B 지시서(SESSION_B.md)를 프로젝트·단계 값으로 채워 복사 블록으로 출력하고 정지.**"
          echo "  사람이 그걸 새 세션 B에 붙여넣어 gjc를 감독한다."
          echo '~~~'
          echo
          echo "### (b) 웹 pro 경로 (GitHub 쓰기 앱 + PR/CI)"
          echo "GitHub 쓰기 앱(create_branch/push_files/create_issue)이 연결된 웹 pro를 세션 A로 쓰는 경로다."
          echo "레포 쓰기는 **branch+PR 로만**(main 직접 금지) — pr-verify green 후 사람이 merge 한다."
          echo
          echo "1) 계약 프롬프트를 연다: [$PRO_PROMPT_URL]($PRO_PROMPT_URL)"
          echo "2) 프롬프트 안의 파라미터를 아래 값으로 치환한 뒤 웹 pro에 붙여넣는다:"
          echo
          echo '~~~text'
          echo "PROJECT     = ${PROJECT}"
          echo "OWNER       = ${OWNER}"
          echo "MGMT_REPO   = ${MGMT_REPO}"
          echo "CODE_REPO   = ${REPO#*/}"
          echo "PHASE_DONE  = P${K}"
          echo "PHASE_NEXT  = P${NEXT}"
          echo '~~~'
          echo
          echo "웹 pro는 MGMT(리포트·status) 1 PR·CODE(P${NEXT}.md) 1 PR 을 열고, 킥오프 이슈에 \`### PROGRESS\` 코멘트로 PR 링크를 게시한 뒤 정지한다. pr-verify green 확인 후 사람이 merge 한다."
          echo
          echo "세션 A가 (a) dev 이슈까지 만들고 세션 B 지시서를 출력했거나, (b) 두 PR을 열어 merge까지 완료되면 이 이슈를 닫으세요."
          } > "$BODY_FILE"
          URL=$(gh issue create -R "$REPO" \
            --title "[P${NEXT}] 세션 A 킥오프 — 지시서 준비됨" \
            --body-file "$BODY_FILE" \
            --label "type:milestone,phase:P${NEXT}")
          echo "kickoff: $URL"
          if [ -n "${NTFY_TOPIC:-}" ]; then
            curl -s -H "Title: ✅ P${K} 완료 — 세션 A 킥오프 준비됨" -H "Priority: high" -H "Tags: rocket" \
              -d "P${K} 완료 — 세션 A 킥오프 준비됨. 복붙 한 번이면 시작: ${URL}" \
              "ntfy.sh/${NTFY_TOPIC}" >/dev/null || true
          fi
