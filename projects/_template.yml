# ─────────────────────────────────────────────────────────────────────────────
# 정책 (공개 레포 규약):
# - 이 파일은 세션 A/B(오케스트레이터·gjc 감독)가 읽는 **입력용 설정**이다.
# - 민감값({SSH_HOST}/{WORKDIR}/{MODEL_MAIN}/{MODEL_EXEC} 등)은 공개 레포 공개본에
#   **채우지 않는다** — placeholder({...})를 그대로 유지한다. 세션 B용 실제 값은 사람이
#   킥오프에서 제공하며 세션 B 지시서(SESSION_B.md)에만 들어간다. NTFY_TOPIC 은 secret 에만 둔다.
# - 이 파일이 **프로젝트 레지스트리의 단일 원천**이다: MGMT Actions(dashboard-data.yml)가
#   projects/*/project.yml 을 스캔해 dashboard/data.json 을 굽고, 대시보드는 그것만 읽는다.
#   (구 dashboard/index.html CONFIG.projects 하드코딩은 폐지 — 별도 대시보드 등록 절차 없음.)
# ─────────────────────────────────────────────────────────────────────────────
# research-ops 프로젝트 설정 — 세션 A/B와 단계 전환이 읽는 진실
project: "{PROJECT}"
owner: "{OWNER}"
mgmt_repo: "{MGMT_REPO}"
code_repo: "{CODE_REPO}"
# 계정 계약 — 판정은 human_login 만, 에이전트 게시는 agent_login 만 (PROTOCOL §2 계정 계약).
human_login: "{HUMAN_LOGIN}"
agent_login: "{AGENT_LOGIN}"
immutables: ".github/immutables.txt (CODE repo)"   # 불변값 매니페스트 위치 — pr-verify 가 P-명세에서 강제
phases: "{P0:이름,P1:이름,...}"
ssh_host: "{SSH_HOST}"
workdir: "{WORKDIR}"
gjc:
  main_models: "{MODEL_MAIN}"    # default/planner/architect
  exec_models: "{MODEL_EXEC}"    # executor/critic
ntfy_topic_name: "NTFY_TOPIC"    # 값은 secret에만 둔다 — 여기엔 적지 않는다
dashboard_title_prefix: "[{PROJECT}] "
